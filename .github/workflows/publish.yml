name: Publish to NPM

on:
  push:
    branches:
      - satish/publish-test
  workflow_dispatch:

jobs:
  check-release:
    name: Check for Version Change
    runs-on: ubuntu-latest
    outputs:
      should-publish: ${{ steps.check.outputs.should-publish }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth: 0 is REQUIRED to:
          # 1. Access HEAD~1 for version comparison
          # 2. Fetch all tags for tag existence checks
          # 3. Support lerna publish from-git
          fetch-depth: 0

      - name: Check if version changed in lerna.json
        id: check
        run: |
          # Get current version from lerna.json
          CURRENT_VERSION=$(jq -r '.version' lerna.json)
          echo "Current version: $CURRENT_VERSION"

          # Get previous version from lerna.json (from previous commit)
          PREVIOUS_VERSION=$(git show HEAD~1:lerna.json | jq -r '.version')
          echo "Previous version: $PREVIOUS_VERSION"

          # Check if version has changed
          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "should-publish=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "Version changed from $PREVIOUS_VERSION to $CURRENT_VERSION - will publish"
          else
            echo "should-publish=false" >> $GITHUB_OUTPUT
            echo "Version unchanged ($CURRENT_VERSION) - skipping publish"
          fi

  publish:
    name: Build and Publish to NPM
    needs: check-release
    if: needs.check-release.outputs.should-publish == 'true'
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth: 0 is REQUIRED for:
          # 1. Fetching all tags to check existence
          # 2. Creating and pushing new tags
          # 3. Lerna publish from-git to work correctly
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'

      - name: Configure Git
        run: |
          git config user.name "zendesk-ops-ci"
          git config user.email "zendesk-ops-ci@users.noreply.github.com"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install oathtool for 2FA
        run: sudo apt-get install --fix-broken --yes oathtool

      - name: Configure NPM Authentication
        run: |
          cat << EOF > .npmrc
          //registry.npmjs.org/:_authToken=$NPM_TOKEN
          registry=https://registry.npmjs.org/
          always-auth=true
          EOF
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify NPM Authentication
        run: |
          echo "Testing NPM authentication..."
          NPM_USER=$(npm whoami)
          echo "✓ Authenticated as: $NPM_USER"

      - name: Rollback Tag on Failure
        if: failure() && steps.create-tag.outputs.tag-created == 'true'
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"

          echo "⚠️  Publish failed - rolling back git tag..."
          echo ""
          echo "Deleting tag: v${VERSION}"

          # Delete from local
          git tag -d "v${VERSION}" 2>/dev/null || true

          # Delete from remote
          git push origin ":refs/tags/v${VERSION}" 2>/dev/null || true

          echo ""
          echo "✓ Tag rolled back successfully"
          echo "  You can retry the release after fixing the issue"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up NPM config
        if: always()
        run: rm -f .npmrc