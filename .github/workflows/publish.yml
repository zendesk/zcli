name: Publish to NPM

on:
  push:
    branches:
      - master
    paths:
      - 'lerna.json'

jobs:
  check-release:
    name: Check for Version Change
    runs-on: ubuntu-latest
    outputs:
      should-publish: ${{ steps.check.outputs.should-publish }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check if version changed in lerna.json
        id: check
        run: |
          CURRENT_VERSION=$(jq -r '.version' lerna.json)
          echo "Current version: $CURRENT_VERSION"

          PREVIOUS_VERSION=$(git show HEAD~1:lerna.json | jq -r '.version')
          echo "Previous version: $PREVIOUS_VERSION"

          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "should-publish=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "Version changed from $PREVIOUS_VERSION to $CURRENT_VERSION - will publish"
          else
            echo "should-publish=false" >> $GITHUB_OUTPUT
            echo "Version unchanged ($CURRENT_VERSION) - skipping publish"
          fi

  publish:
    name: Build and Publish to NPM
    needs: check-release
    if: needs.check-release.outputs.should-publish == 'true'
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install oathtool for 2FA
        run: sudo apt-get install --fix-broken --yes oathtool

      - name: Configure NPM Authentication
        run: |
          cat << EOF > .npmrc
          //registry.npmjs.org/:_authToken=$NPM_TOKEN
          registry=https://registry.npmjs.org/
          always-auth=true
          EOF
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify NPM Authentication
        run: |
          echo "Testing NPM authentication..."
          NPM_USER=$(npm whoami)
          echo "Authenticated as: $NPM_USER"

      - name: Publish to NPM
        run: |
          echo "Publishing packages to npm..."
          echo ""

          TOTP=$(oathtool --base32 --totp "${NPM_TOTP_DEVICE}")

          yarn lerna publish from-package \
            --yes \
            --no-verify-access \
            --otp $TOTP

          echo ""
          echo "Publish completed successfully!"
          echo "Packages published to NPM"
          echo "Git tag v${{ needs.check-release.outputs.version }} was created during PR merge"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOTP_DEVICE: ${{ secrets.NPM_TOTP_DEVICE }}

      - name: Clean up NPM config
        if: always()
        run: rm -f .npmrc
